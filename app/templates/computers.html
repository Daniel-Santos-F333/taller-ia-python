{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">Registrar Nuevo Equipo</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Serial</label>
                        <input type="text" name="serial" class="form-control" required placeholder="Ej: CAMP-123">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Marca</label>
                        <input type="text" name="brand" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Modelo</label>
                        <input type="text" name="model" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Guardar Activo</button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-8">
        <h3>Equipos Registrados</h3>
        <ul class="list-group">
            {% for pc in computers %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ pc.serial }} - {{ pc.brand }} {{ pc.model }}
                <span class="badge bg-secondary">{{ pc.status }}</span>
            </li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock %}
